<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة ليكي ❤️</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="stars"></div>

<section class="intro" id="intro">
  <h1 id="question"></h1>
  <p class="sub">وقررت أجاوبك... بس بطريقتي ❤️</p>
</section>

<section class="envelope-screen hidden" id="envelopeScreen">
  <div class="hint">اضغطي على الظرف علشان تعرفي إجابتي 💌</div>

  <div class="envelope-wrapper">
    <div class="envelope" id="envelope">
      <div class="back"></div>
      <div class="letter" id="letter">
        <div class="paper">
          <h2>إلى حبيبتي ❤️</h2>
          <p id="message"></p>
        </div>
      </div>
      <div class="front"></div>
      <div class="flap"></div>
      <div class="seal">❤️</div>
    </div>
  </div>

  <div class="ending hidden" id="ending">
    <div class="final-line">وده مجرد جزء بسيط من اللي جوايا...</div>
    <div class="final-line delay">لأن اللي جوايا أكبر بكتير من أي كلام ممكن يتكتب ❤️</div>
    <div class="pulse-heart">💖</div>
    <div class="last-word">بحبك.</div>
  </div>
</section>

<audio id="openSound">
  <source src="open.mp3" type="audio/mpeg">
</audio>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
